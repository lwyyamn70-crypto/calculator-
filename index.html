<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>آلة حاسبة بسيطة</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: #f2f2f2;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 18px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        h2 {
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>آلة حاسبة</h2>

    <input type="number" id="num1" placeholder="الرقم الأول"><br>
    <input type="number" id="num2" placeholder="الرقم الثاني"><br>

    <button onclick="calc('+')">جمع</button>
    <button onclick="calc('-')">طرح</button>
    <button onclick="calc('*')">ضرب</button>
    <button onclick="calc('/')">قسمة</button>

    <h3 id="result">النتيجة: </h3>
</div>

<script>
function calc(op) {
    let num1 = parseFloat(document.getElementById("num1").value);
    let num2 = parseFloat(document.getElementById("num2").value);
    let result;

    if (op === '+') result = num1 + num2;
    if (op === '-') result = num1 - num2;
    if (op === '*') result = num1 * num2;
    if (op === '/') {
        if (num2 === 0) {
            document.getElementById("result").innerText = "لا يمكن القسمة على صفر";
            return;
        }
        result = num1 / num2;
    }

    document.getElementById("result").innerText = "النتيجة: " + result;
}
</script>

</body>
</html>
