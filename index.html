<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>آلة حاسبة احترافية</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f, #111119);
            padding: 20px;
        }

        .calculator {
            background: #232334;
            width: 100%;
            max-width: 360px;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid #2f2f45;
        }

        .title {
            color: #8a8cb0;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .inputs-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #181824;
            border: 1px solid #2f2f45;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #00adb5;
            box-shadow: 0 0 8px rgba(0, 173, 181, 0.3);
        }

        /* الشاشة الرقمية الفخمة */
        .screen {
            background: #111119;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: left;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            border-left: 4px solid #00adb5;
            overflow-x: auto;
        }

        #result {
            color: #00adb5;
            font-size: 24px;
            font-weight: bold;
            word-break: break-all;
        }

        .error-text {
            color: #ff4a5a !important;
            font-size: 18px !important;
        }

        /* شبكة الأزرار الاحترافية */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 14px;
            color: white;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: scale(0.95);
        }

        /* ألوان الأزرار الفخمة */
        .btn-plus { background: linear-gradient(135deg, #28a745, #1e7e34); }
        .btn-minus { background: linear-gradient(135deg, #dc3545, #bd2130); }
        .btn-multiply { background: linear-gradient(135deg, #fd7e14, #d36605); }
        .btn-divide { background: linear-gradient(135deg, #007bff, #0062cc); }

        button:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="title">آلة حاسبة ذكية</div>
    
    <!-- الشاشة الرقمية للنتيجة -->
    <div class="screen">
        <div id="result">0</div>
    </div>

    <!-- خانات إدخال الأرقام -->
    <div class="inputs-container">
        <input type="number" id="num1" placeholder="الرقم الأول">
        <input type="number" id="num2" placeholder="الرقم الثاني">
    </div>

    <!-- لوحة العمليات -->
    <div class="buttons-grid">
        <button class="btn-plus" onclick="calc('+')"> ➕ جمع</button>
        <button class="btn-minus" onclick="calc('-')"> ➖ طرح</button>
        <button class="btn-multiply" onclick="calc('*')"> ✖️ ضرب</button>
        <button class="btn-divide" onclick="calc('/')"> ➗ قسمة</button>
    </div>
</div>

<script>
function calc(op) {
    let val1 = document.getElementById("num1").value;
    let val2 = document.getElementById("num2").value;
    let resultElement = document.getElementById("result");

    // التحقق من إدخال الأرقام أولاً لضمان الفخامة والذكاء
    if (val1 === "" || val2 === "") {
        resultElement.innerText = "يرجى إدخال الأرقام!";
        resultElement.classList.add("error-text");
        return;
    }

    let num1 = parseFloat(val1);
    let num2 = parseFloat(val2);
    let result;

    resultElement.classList.remove("error-text");

    if (op === '+') result = num1 + num2;
    if (op === '-') result = num1 - num2;
    if (op === '*') result = num1 * num2;
    if (op === '/') {
        if (num2 === 0) {
            resultElement.innerText = "لا يمكن القسمة على صفر!";
            resultElement.classList.add("error-text");
            return;
        }
        result = num1 / num2;
    }

    // تقريب الأرقام العشرية الطويلة ليظل المظهر فخماً ومنظماً
    if (!Number.isInteger(result)) {
        result = Math.round(result * 100000) / 100000;
    }

    resultElement.innerText = result;
}
</script>

</body>
</html>
